name: 财经数据自动采集

on:
  schedule:
    # ====== 交易关键时点（错峰3分钟）======
    # 07:57 CST = 23:57 UTC — 开盘前美股映射
    - cron: "57 23 * * *"
    # 09:12 CST = 01:12 UTC — 竞价前最后一手数据
    - cron: "12 1 * * *"
    # 09:57 CST = 01:57 UTC — 开盘30分方向确认
    - cron: "57 1 * * *"
    # 10:57 CST = 02:57 UTC — 早盘最优窗口
    - cron: "57 2 * * *"
    # 12:57 CST = 04:57 UTC — 午盘开盘前
    - cron: "57 4 * * *"
    # 14:27 CST = 06:27 UTC — 尾盘30分决策
    - cron: "27 6 * * *"
    # 15:07 CST = 07:07 UTC — 收盘数据落定
    - cron: "7 7 * * *"
    # 周日 17:57 CST = 09:57 UTC — 周度复盘
    - cron: "57 9 * * 0"
    # ====== 常规每2小时 ======
    - cron: "0 22,0,2,4,6,8,10,12,14 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: 采集数据
        run: python tools/rss-scraper.py
      - name: 生成摘要
        run: python tools/gen-summary.py
      - name: 提交更新
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add data/ finance-summary.html
          git diff --cached --quiet || git commit -m "自动更新: $(TZ='Asia/Shanghai' date '+%m/%d %H:%M')"
          git push
